general {
    hide_cursor = true
    grace = 0
    ignore_empty_input = true
}

background {
    monitor =
    path = ~/Pictures/wallpapers/black-squares.jpg
    blur_passes = 3
    blur_size = 6
    color = rgb(1C1E26)
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(D5CED9ff)
    font_size = 92
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 240
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(677691ff)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(00E8C6ff)
    inner_color = rgba(23262Eff)
    font_color = rgba(D5CED9ff)
    fade_on_empty = false
    placeholder_text = <span foreground="##677691">Unlock</span>
    fail_color = rgba(EE5D43ff)
    fail_text = <span foreground="##EE5D43">$FAIL</span>
    check_color = rgba(FFE66Dff)
    position = 0, -40
    halign = center
    valign = center
}

# User
label {
    monitor =
    text =   $USER
    color = rgba(B084EBff)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -120
    halign = center
    valign = center
}
